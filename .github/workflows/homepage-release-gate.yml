name: Homepage release gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homepage-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  VITE_SITE_URL: https://truth-trace-forge.lovable.app
  SITE_UNDER_TEST: http://127.0.0.1:4173

jobs:
  release-gate:
    name: Deterministic public-release gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out the pull-request candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Pin Node.js 22.17.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.17.0

      - name: Pin Bun 1.3.14
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Validate required files, secrets, and tracked release surface
        run: bun run release:surface

      - name: Frozen dependency install
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun run test

      - name: Dependency advisory threshold
        run: bun run audit:dependencies

      - name: Publication configuration validation
        run: bun run release:config

      - name: Production artifact build
        run: bun run build:artifact

      - name: Publication build
        run: bun run build:publication

      - name: Reject production source maps and embedded sources
        shell: bash
        run: |
          set -euo pipefail
          test -d .output
          if find .output -type f -name '*.map' -print -quit | grep -q .; then
            echo 'Production source maps are forbidden.' >&2
            exit 1
          fi
          if grep -RIlE 'sourceMappingURL=|sourcesContent' .output > /dev/null; then
            echo 'Embedded source-map markers are forbidden.' >&2
            exit 1
          fi

      - name: Link and route validation against the local publication artifact
        shell: bash
        run: |
          set -euo pipefail
          setsid bun run preview > "$RUNNER_TEMP/homepage-preview.log" 2>&1 &
          preview_pid=$!
          cleanup() {
            kill -- "-$preview_pid" 2>/dev/null || true
            wait "$preview_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=0
          for attempt in $(seq 1 40); do
            if curl --fail --silent --show-error --connect-timeout 2 --max-time 5 "$SITE_UNDER_TEST/" > /dev/null; then
              ready=1
              break
            fi
            sleep 0.5
          done

          if [[ "$ready" -ne 1 ]]; then
            cat "$RUNNER_TEMP/homepage-preview.log" >&2
            exit 1
          fi

          if ! bun run check:links; then
            cat "$RUNNER_TEMP/homepage-preview.log" >&2
            exit 1
          fi
