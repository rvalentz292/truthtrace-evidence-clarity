name: Temporary link-check diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  debug-link-check:
    runs-on: ubuntu-24.04
    env:
      CI: "true"
      VITE_SITE_URL: https://truthtrace.ai
      SITE_UNDER_TEST: http://127.0.0.1:4173
    steps:
      - name: Check out candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.17.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build publication artifact
        run: bun run build:publication

      - name: Run and capture link check
        shell: bash
        run: |
          set +e
          setsid bun run preview > "$RUNNER_TEMP/homepage-preview.log" 2>&1 &
          preview_pid=$!
          cleanup() {
            kill -- "-$preview_pid" 2>/dev/null || true
            wait "$preview_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=0
          for attempt in $(seq 1 40); do
            if curl --fail --silent --show-error --connect-timeout 2 --max-time 5 "$SITE_UNDER_TEST/" > /dev/null; then
              ready=1
              break
            fi
            sleep 0.5
          done

          if [[ "$ready" -ne 1 ]]; then
            echo "Preview did not become ready." > link-check.log
            cat "$RUNNER_TEMP/homepage-preview.log" >> link-check.log
            exit 0
          fi

          bun run check:links > link-check.log 2>&1
          echo "$?" > link-check-status.txt
          cp "$RUNNER_TEMP/homepage-preview.log" preview.log
          exit 0

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-diagnostic
          path: |
            link-check.log
            link-check-status.txt
            preview.log
          if-no-files-found: warn
          retention-days: 1
