name: Temporary HomePage formatter

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - brand/standardize-truthtrace-logo

permissions:
  contents: read

jobs:
  format-homepage:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.17.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format HomePage
        run: bunx prettier --write src/components/site/HomePage.tsx

      - name: Upload formatted HomePage
        uses: actions/upload-artifact@v4
        with:
          name: formatted-homepage
          path: src/components/site/HomePage.tsx
          if-no-files-found: error
          retention-days: 1
