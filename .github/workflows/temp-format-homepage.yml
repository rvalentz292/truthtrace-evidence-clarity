name: Temporary HomePage formatter

on:
  push:
    branches:
      - brand/standardize-truthtrace-logo

permissions:
  contents: write

jobs:
  format-homepage:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out formatting branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: brand/standardize-truthtrace-logo
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.17.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format HomePage
        run: bunx prettier --write src/components/site/HomePage.tsx

      - name: Commit formatting result
        shell: bash
        run: |
          if git diff --quiet -- src/components/site/HomePage.tsx; then
            echo "HomePage already matches the repository format contract."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/site/HomePage.tsx
          git commit -m "style: format homepage with repository Prettier contract"
          git push origin HEAD:brand/standardize-truthtrace-logo
